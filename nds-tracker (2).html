<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NDS Title Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --border:#2d3748;
  --border2:#3a4a5c;
  --text:#e2e8f0;
  --muted:#8b9ab0;
  --faint:#4a5568;
  --blue:#3b82f6;
  --blue2:#1d4ed8;
  --cyan:#06b6d4;
  --gold:#f59e0b;
  --gold2:#b45309;
  --green:#10b981;
  --green2:#065f46;
  --red:#f87171;
  --purple:#a78bfa;
  --orange:#fb923c;
  --water:#38bdf8;
  --lj:#3b82f6;
  --ss:#06b6d4;
  --gj:#10b981;
  --ff:#f59e0b;
  --shed:#a78bfa;
  --tr:#fb923c;
  --r:8px;
  --r2:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}

/* ── STICKY HEADER ──────────────────────────── */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.hdr-inner{
  max-width:1280px;margin:0 auto;
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;letter-spacing:.08em;
  color:var(--water);line-height:1;
  white-space:nowrap;
}
.logo sub{
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;font-weight:500;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;
  display:block;margin-top:1px;
}
.search-wrap{flex:1;min-width:180px;position:relative;}
#searchBox{
  width:100%;padding:8px 12px 8px 36px;
  background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.88rem;
  outline:none;transition:border-color .18s;
}
#searchBox:focus{border-color:var(--blue);}
.search-wrap::before{
  content:'⌕';position:absolute;left:11px;top:50%;
  transform:translateY(-50%);color:var(--faint);font-size:1rem;
  pointer-events:none;
}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:.8rem;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.pill:hover{border-color:var(--blue);color:var(--text);}
.pill.active{background:var(--blue2);border-color:var(--blue);color:#fff;}
.hdr-right{display:flex;gap:8px;align-items:center;margin-left:auto;}
.hdr-btn{
  padding:6px 12px;border-radius:var(--r2);
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:.78rem;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.hdr-btn:hover{background:var(--surface2);color:var(--text);}

/* ── CONFIG STRIP ──────────────────────────── */
.config-strip{
  background:rgba(0,0,0,.25);
  border-bottom:1px solid var(--border);
  padding:8px 16px;display:none;
  flex-wrap:wrap;gap:8px;align-items:center;
  font-size:.8rem;color:var(--muted);
}
.config-strip.open{display:flex;}
.config-strip input{
  flex:1;min-width:240px;padding:6px 10px;
  background:var(--bg);border:1px solid var(--border2);
  border-radius:var(--r2);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.78rem;outline:none;
}
.config-strip button{
  padding:6px 14px;border-radius:var(--r2);
  border:none;background:var(--blue2);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;
  transition:background .15s;
}
.config-strip button:hover{background:var(--blue);}
.config-strip .btn-demo{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);}
.config-strip .btn-demo:hover{color:var(--text);}

/* ── MAIN ──────────────────────────────────── */
main{max-width:1280px;margin:0 auto;padding:20px 16px 60px;}
.meta-bar{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;flex-wrap:wrap;
}
.meta-bar span{font-size:.82rem;color:var(--muted);}
#dogCount{color:var(--text);font-weight:600;}
.meta-btn{
  padding:4px 10px;border-radius:var(--r2);
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.75rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.meta-btn:hover{background:var(--surface2);color:var(--text);}

/* ── DOG GRID ──────────────────────────────── */
.dog-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:14px;
}

/* ── DOG CARD ──────────────────────────────── */
.dog-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color .18s, box-shadow .18s;
}
.dog-card:hover{border-color:var(--border2);}

.card-head{
  padding:12px 14px 10px;
  background:linear-gradient(135deg,var(--surface2) 0%,var(--surface) 100%);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  user-select:none;
}
.card-head:hover{background:var(--surface2);}
.dog-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.35rem;letter-spacing:.06em;
  color:var(--text);line-height:1.1;
}
.dog-id{
  font-family:'DM Mono',monospace;
  font-size:.68rem;color:var(--water);
  background:rgba(56,189,248,.08);
  border:1px solid rgba(56,189,248,.2);
  padding:2px 7px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;margin-top:2px;
}
.chevron{color:var(--faint);font-size:.85rem;margin-top:4px;transition:transform .22s;}
.dog-card.expanded .chevron{transform:rotate(180deg);}

/* Compact badge strip */
.badge-strip{
  display:flex;flex-wrap:wrap;gap:4px;
  padding:8px 14px;
  background:rgba(0,0,0,.15);
  border-bottom:1px solid var(--border);
  min-height:34px;
}
.b{
  font-size:.65rem;font-weight:600;letter-spacing:.06em;
  padding:2px 7px;border-radius:3px;text-transform:uppercase;
}
.b-chdd{background:rgba(245,158,11,.18);color:var(--gold);border:1px solid rgba(245,158,11,.35);}
.b-gchdd{background:rgba(245,158,11,.3);color:#fcd34d;border:1px solid rgba(245,158,11,.5);}
.b-schdd{background:rgba(250,204,21,.35);color:#fde68a;border:1px solid rgba(250,204,21,.5);}
.b-dock{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.b-shed{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.b-tr{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.3);}
.b-none{font-size:.72rem;color:var(--faint);padding:4px 0;}

/* Card body */
.card-body{display:none;padding:14px;}
.dog-card.expanded .card-body{display:block;}

/* Summary row */
.summary-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;margin-bottom:14px;
}
.s-chip{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r2);padding:7px 8px;text-align:center;
}
.s-chip .val{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;line-height:1;
  color:var(--text);
}
.s-chip .lbl{
  font-size:.63rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;
  margin-top:1px;
}

/* Sport tabs */
.sport-tabs{
  display:flex;gap:0;
  border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  margin-bottom:12px;
}
.stab{
  flex:1;padding:6px 4px;
  background:transparent;border:none;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:.72rem;font-weight:600;cursor:pointer;
  text-transform:uppercase;letter-spacing:.05em;
  border-right:1px solid var(--border);
  transition:all .15s;
}
.stab:last-child{border-right:none;}
.stab:hover{background:var(--surface2);color:var(--text);}
.stab.active{background:var(--surface2);color:var(--text);}
.stab.active[data-sport="dock"]{color:var(--blue);}
.stab.active[data-sport="shed"]{color:var(--purple);}
.stab.active[data-sport="tr"]{color:var(--orange);}

.sport-pane{display:none;}
.sport-pane.active{display:block;}

/* ── DOCK DIVING PANEL ─────────────────────── */
.event-row{margin-bottom:12px;}
.ev-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.ev-name{
  font-size:.8rem;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.ev-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.dot-lj{background:var(--lj);}
.dot-ss{background:var(--ss);}
.dot-gj{background:var(--gj);}
.dot-ff{background:var(--ff);}
.ev-right{display:flex;align-items:center;gap:8px;}
.ev-pts{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);}
.ev-title{font-size:.68rem;font-weight:600;color:var(--gold);padding:1px 6px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:3px;}

.bar-track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:3px;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.bar-lj{background:linear-gradient(90deg,#1d4ed8,var(--lj));}
.bar-ss{background:linear-gradient(90deg,#0e7490,var(--ss));}
.bar-gj{background:linear-gradient(90deg,#065f46,var(--gj));}
.bar-ff{background:linear-gradient(90deg,#92400e,var(--ff));}
.bar-tr{background:linear-gradient(90deg,#c2410c,var(--tr));}

.ev-desc{font-size:.7rem;color:var(--faint);}

/* ChDD checker */
.champ-block{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r2);padding:10px 12px;margin-top:10px;
}
.champ-title{
  font-size:.72rem;font-weight:600;color:var(--gold);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;
}
.champ-req{
  font-size:.74rem;color:var(--muted);
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.champ-req.met{color:var(--green);}
.champ-req .tick{width:14px;text-align:center;}

.best-row{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;
}
.best-chip{
  font-family:'DM Mono',monospace;font-size:.68rem;
  padding:2px 8px;border-radius:3px;
  background:var(--bg);border:1px solid var(--border);color:var(--muted);
}
.best-chip span{color:var(--text);}

/* ── SHED ANTLER PANEL ─────────────────────── */
.shed-levels{margin-bottom:12px;}
.shed-lv{margin-bottom:10px;}
.shed-lv-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;
}
.shed-lv-name{font-size:.8rem;font-weight:600;color:var(--text);}
.shed-lv-stat{font-size:.72rem;color:var(--muted);}
.shed-lv-stat.done{color:var(--green);font-weight:600;}
.shed-lv-stat.locked{color:var(--faint);}

.tests-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin-top:10px;
}
.test-cat{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r2);padding:8px 10px;
}
.test-cat-name{
  font-size:.68rem;font-weight:600;color:var(--purple);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;
}
.test-el{
  font-size:.7rem;color:var(--faint);
  display:flex;align-items:center;gap:5px;margin-bottom:3px;
}
.test-el.pass{color:var(--text);}
.tel-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--faint);
}
.test-el.pass .tel-dot{background:var(--green);}

/* ── TIMED RECALL PANEL ────────────────────── */
.tr-progress{margin-bottom:10px;}
.tr-stat{
  display:flex;justify-content:space-between;
  margin-bottom:4px;
}
.tr-stat-label{font-size:.8rem;font-weight:600;color:var(--text);}
.tr-stat-val{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--orange);}

/* ── RUN TABLES (shared) ───────────────────── */
.runs-toggle{
  font-size:.73rem;color:var(--blue);cursor:pointer;
  margin-bottom:5px;display:inline-block;
  text-decoration:none;
}
.runs-toggle:hover{color:var(--cyan);}
.runs-wrap{display:none;margin-top:4px;overflow-x:auto;}
.runs-wrap.open{display:block;}
.rt{width:100%;border-collapse:collapse;font-size:.7rem;}
.rt th{
  background:rgba(0,0,0,.3);color:var(--muted);
  padding:4px 7px;text-align:left;
  font-family:'DM Mono',monospace;font-weight:500;
  font-size:.65rem;white-space:nowrap;
}
.rt td{
  padding:4px 7px;border-bottom:1px solid rgba(255,255,255,.03);
  color:var(--muted);white-space:nowrap;
}
.rt tr:last-child td{border-bottom:none;}
.rt tr:hover td{background:rgba(255,255,255,.02);}
.rt .hi{color:var(--text);}
.rt .q-y{color:var(--green);font-weight:600;}
.rt .q-n{color:var(--red);}
.rt .fin{color:var(--gold);}
.rt .ramp{color:var(--purple);}
.rt .title-note{color:var(--gold);font-weight:600;}

/* section divider */
.sec-div{
  font-size:.68rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
  margin:10px 0 7px;padding-bottom:4px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.sec-div a{
  font-size:.65rem;color:var(--faint);
  text-decoration:none;transition:color .15s;
}
.sec-div a:hover{color:var(--blue);}

/* status/loading */
#status{
  text-align:center;padding:40px;
  color:var(--muted);font-size:.9rem;
}
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid var(--border2);border-top-color:var(--blue);
  border-radius:50%;animation:sp .7s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .dog-grid{grid-template-columns:1fr;}
  .summary-row{grid-template-columns:repeat(4,1fr);}
  .tests-grid{grid-template-columns:1fr;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="logo">NDS<br><sub>National Dog Sports · Title Tracker</sub></div>
    <div class="search-wrap">
      <input type="text" id="searchBox" placeholder="Search name or ID…" oninput="filterCards()">
    </div>
    <div class="filter-pills">
      <button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill" onclick="setFilter('champion',this)">Champions</button>
      <button class="pill" onclick="setFilter('titled',this)">Titled</button>
      <button class="pill" onclick="setFilter('shed',this)">Shed Hunters</button>
      <button class="pill" onclick="setFilter('tr',this)">Recallers</button>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="toggleConfig()">⚙ Data Source</button>
    </div>
  </div>
  <div class="config-strip" id="configStrip">
    <span>Load from URL:</span>
    <input type="text" id="jsonUrl" placeholder="https://raw.githubusercontent.com/…/NDS_Master_Data.xlsx">
    <button onclick="loadFromUrl()">Load from URL</button>
    <button class="btn-demo" onclick="loadXLSX('NDS_Master_Data.xlsx')">Reload Local</button>
    <span style="font-size:.72rem;color:var(--faint)">GitHub raw URL to NDS_Master_Data.xlsx</span>
  </div>
</header>

<main>
  <div class="meta-bar">
    <span>Showing <span id="dogCount">0</span> dogs</span>
    <button class="meta-btn" onclick="expandAll()">Expand All</button>
    <button class="meta-btn" onclick="collapseAll()">Collapse All</button>
  </div>
  <div id="status"><span class="spin"></span>Loading…</div>
  <div class="dog-grid" id="dogGrid"></div>
</main>

<script>
// ── TITLE THRESHOLDS ─────────────────────────
const LJ_TITLES=[
  {pts:55,name:'Dock Diver',abbr:'DD'},
  {pts:205,name:'Advanced Long Jump',abbr:'ADD'},
  {pts:455,name:'Expert Long Jump',abbr:'EDD'},
  {pts:955,name:'Specialist Long Jump',abbr:'SDD'},
  {pts:1205,name:'Specialist LJ II',abbr:'SDD II'},
  {pts:1455,name:'Specialist LJ III',abbr:'SDD III'},
];
const SS_TITLES=[
  {pts:45,name:'Basic Speed Swim',abbr:'BSS'},
  {pts:145,name:'Advanced Speed Swim',abbr:'ASS'},
  {pts:345,name:'Expert Speed Swim',abbr:'ESS'},
  {pts:545,name:'Specialist Speed Swim',abbr:'SpSS'},
  {pts:645,name:'Specialist SS II',abbr:'SpSS II'},
];
const GJ_TITLES=[
  {pts:45,name:'Basic Grab Jump',abbr:'BGJ'},
  {pts:145,name:'Advanced Grab Jump',abbr:'AGJ'},
  {pts:345,name:'Expert Grab Jump',abbr:'EGJ'},
  {pts:545,name:'Specialist Grab Jump',abbr:'SpGJ'},
  {pts:645,name:'Specialist GJ II',abbr:'SpGJ II'},
];
const FF_TITLES=[
  {pts:45,name:'Basic Fast Fetch',abbr:'BFF'},
  {pts:145,name:'Advanced Fast Fetch',abbr:'AFF'},
  {pts:345,name:'Expert Fast Fetch',abbr:'EFF'},
  {pts:545,name:'Specialist Fast Fetch',abbr:'SpFF'},
  {pts:645,name:'Specialist FF II',abbr:'SpFF II'},
];
const TR_TITLES=[
  {pts:200,name:'Novice Recaller',abbr:'NR'},
  {pts:500,name:'Advanced Recaller',abbr:'AR'},
  {pts:1000,name:'Master Recaller',abbr:'MR'},
  {pts:1500,name:'Expert Recaller',abbr:'ExR'},
  {pts:2000,name:'Specialist Recaller',abbr:'SpR'},
  {pts:2500,name:'Champion Recaller',abbr:'CR'},
];
function currentTitle(pts,thresholds){
  let cur=null;
  for(const t of thresholds){if(pts>=t.pts)cur=t;}
  return cur;
}
function nextTitle(pts,thresholds){
  for(const t of thresholds){if(pts<t.pts)return t;}
  return null;
}

// ── CHAMPION CHECKS ──────────────────────────
function checkChDD(dog){
  const d=dog.dock;
  const total=(d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const allBasic=(d.lj.titlePts>=55)&&(d.ss.titlePts>=45)&&(d.gj.titlePts>=45)&&(d.ff.titlePts>=45);
  const winPts=(d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);
  return{total,allBasic,winPts,met:total>=200&&allBasic&&winPts>=5};
}
function checkGChDD(dog){
  const d=dog.dock;
  const total=(d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const each100=(d.lj.titlePts>=100)&&(d.ss.titlePts>=100)&&(d.gj.titlePts>=100)&&(d.ff.titlePts>=100);
  const winPts=(d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);
  return{total,each100,winPts,met:total>=500&&each100&&winPts>=15};
}
function checkSChDD(dog){
  const d=dog.dock;
  const total=(d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const allAdv=(d.lj.titlePts>=205)&&(d.ss.titlePts>=145)&&(d.gj.titlePts>=145)&&(d.ff.titlePts>=145);
  const winPts=(d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);
  return{total,allAdv,winPts,met:total>=1000&&allAdv&&winPts>=25};
}

// ── SHED TEST DEFINITIONS ─────────────────────
const SHED_TESTS={
  Locate:['Open Field (mid-field)','Open Field (near edge)','Brush/Forest (base of tree)','Brush/Forest (between trees)','Gully/Ditch (1)','Gully/Ditch (2)','Dangler (1)','Dangler (2)'],
  Retrieve:['30 Meters','Grade','Obstacle','Bush'],
  Seasonal:['Snow/Water','Mud/Dirt','Leaves','Wind/Precipitation'],
  Multiples:['2-Multi-Factor','6 No Cover','3 Low Cover','Unknown Number'],
};

// ── STATE ─────────────────────────────────────
let ALL_DOGS=[];
let curFilter='all';

// ── HELPERS ──────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function pct(v,max){return Math.min(100,max>0?(v/max)*100:0);}
function ord(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function buildBadges(dog){
  const te=dog.titlesEarned||[];
  const names=te.map(t=>t.name.toLowerCase());
  let out='';
  if(checkSChDD(dog).met||names.some(n=>n.includes('supreme')))
    out+=`<span class="b b-schdd">SChDD</span>`;
  else if(checkGChDD(dog).met||names.some(n=>n.includes('grand champ')))
    out+=`<span class="b b-gchdd">GChDD</span>`;
  else if(checkChDD(dog).met||names.some(n=>n.includes('champion dock')))
    out+=`<span class="b b-chdd">ChDD</span>`;
  
  const lj=currentTitle(dog.dock.lj.titlePts||0,LJ_TITLES);
  const ss=currentTitle(dog.dock.ss.titlePts||0,SS_TITLES);
  const gj=currentTitle(dog.dock.gj.titlePts||0,GJ_TITLES);
  const ff=currentTitle(dog.dock.ff.titlePts||0,FF_TITLES);
  if(lj)out+=`<span class="b b-dock" title="Long Jump">${esc(lj.abbr)}</span>`;
  if(ss)out+=`<span class="b b-dock" title="Speed Swim">${esc(ss.abbr)}</span>`;
  if(gj)out+=`<span class="b b-dock" title="Grab Jump">${esc(gj.abbr)}</span>`;
  if(ff)out+=`<span class="b b-dock" title="Fast Fetch">${esc(ff.abbr)}</span>`;

  const shed=dog.shed||{};
  const shedLevels=shed.levels||{};
  const shedTitles=Object.entries(shedLevels).filter(([,v])=>v.done).map(([k])=>parseInt(k));
  if(shed.tests&&Object.values(shed.tests).every(Boolean))
    out+=`<span class="b b-shed">SASV</span>`;
  if(shedTitles.includes(4))out+=`<span class="b b-shed">SA-L4</span>`;
  else if(shedTitles.includes(3))out+=`<span class="b b-shed">SA-L3</span>`;
  else if(shedTitles.includes(2))out+=`<span class="b b-shed">SA-L2</span>`;
  else if(shedTitles.includes(1))out+=`<span class="b b-shed">SA-L1</span>`;

  const tr=dog.timed_recall||{};
  const trTitle=currentTitle(tr.totalPts||0,TR_TITLES);
  if(trTitle)out+=`<span class="b b-tr">${esc(trTitle.abbr)}</span>`;

  return out||`<span class="b-none">No titles yet</span>`;
}

function buildDockPanel(dog){
  const d=dog.dock;
  const totalPts=(d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const totalWin=(d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);

  const events=[
    {key:'lj',label:'Long Jump',cls:'lj',barCls:'bar-lj',pts:d.lj.titlePts||0,win:d.lj.winPts||0,pb:d.lj.personalBest,history:d.lj.history||[],thresholds:LJ_TITLES},
    {key:'ss',label:'Speed Swim',cls:'ss',barCls:'bar-ss',pts:d.ss.titlePts||0,win:d.ss.winPts||0,pb:d.ss.personalBest,history:d.ss.history||[],thresholds:SS_TITLES},
    {key:'gj',label:'Grab Jump',cls:'gj',barCls:'bar-gj',pts:d.gj.titlePts||0,win:d.gj.winPts||0,pb:d.gj.personalBest,history:d.gj.history||[],thresholds:GJ_TITLES},
    {key:'ff',label:'Fast Fetch',cls:'ff',barCls:'bar-ff',pts:d.ff.titlePts||0,win:d.ff.winPts||0,pb:d.ff.personalBest,history:d.ff.history||[],thresholds:FF_TITLES},
  ];

  let html=`<div class="sec-div">Dock Diving <a href="https://nationaldogsports.com/dock-diving" target="_blank">📄 Rules</a></div>`;

  // best row
  const bests=events.filter(e=>e.pb).map(e=>`<div class="best-chip">${e.key.toUpperCase()} <span>${esc(e.pb)}</span></div>`);
  if(bests.length)html+=`<div class="best-row">${bests.join('')}</div>`;

  // event rows
  for(const ev of events){
    const cur=currentTitle(ev.pts,ev.thresholds);
    const nxt=nextTitle(ev.pts,ev.thresholds);
    const maxPts=nxt?nxt.pts:(cur?cur.pts:45);
    const prevPts=cur?ev.thresholds[ev.thresholds.indexOf(cur)-1]?.pts||0:0;
    const p=nxt?pct(ev.pts-prevPts,nxt.pts-prevPts):100;
    let desc='';
    if(nxt)desc=`${ev.pts} pts · need ${nxt.pts-ev.pts} more for ${nxt.name}`;
    else if(cur)desc=`${ev.pts} pts · ${cur.name} ✓`;
    else desc=`${ev.pts} pts · ${ev.thresholds[0].pts-ev.pts} needed for ${ev.thresholds[0].name}`;
    if(ev.win>0)desc+=` · ${ev.win} win pts`;

    const tableId=`${dog.id}-${ev.key}-runs`;
    const runsHtml=buildRunTable(dog.id,ev.key,ev.history);

    html+=`<div class="event-row">
      <div class="ev-label">
        <span class="ev-name"><span class="ev-dot dot-${ev.cls}"></span>${ev.label}</span>
        <span class="ev-right">
          <span class="ev-pts">${ev.pts}pt</span>
          ${cur?`<span class="ev-title">${esc(cur.abbr)}</span>`:''}
        </span>
      </div>
      <div class="bar-track"><div class="bar-fill ${ev.barCls}" style="width:${p}%"></div></div>
      <div class="ev-desc">${desc}</div>
      ${ev.history.length?`<span class="runs-toggle" onclick="toggleRuns('${tableId}',this)">▶ Show ${ev.history.length} run${ev.history.length>1?'s':''}</span>
      <div class="runs-wrap" id="${tableId}">${runsHtml}</div>`:''}
    </div>`;
  }

  // Champion checker
  const chdd=checkChDD(dog);
  const gchdd=checkGChDD(dog);
  const schdd=checkSChDD(dog);
  html+=`<div class="champ-block">
    <div class="champ-title">Champion Progress</div>`;

  const champLevels=[
    {label:'Champion Dock Diver (ChDD)',c:chdd,reqs:[
      {label:`200 total pts (${chdd.total})`,met:chdd.total>=200},
      {label:`Basic in all 4 events`,met:chdd.allBasic},
      {label:`5 win pts (${chdd.winPts})`,met:chdd.winPts>=5},
    ]},
    {label:'Grand Champion (GChDD)',c:gchdd,reqs:[
      {label:`500 total pts (${gchdd.total})`,met:gchdd.total>=500},
      {label:`100 pts each event`,met:gchdd.each100},
      {label:`15 win pts (${gchdd.winPts})`,met:gchdd.winPts>=15},
    ]},
    {label:'Supreme Champion (SChDD)',c:schdd,reqs:[
      {label:`1000 total pts (${schdd.total})`,met:schdd.total>=1000},
      {label:`Advanced in all 4 events`,met:schdd.allAdv},
      {label:`25 win pts (${schdd.winPts})`,met:schdd.winPts>=25},
    ]},
  ];

  for(const cl of champLevels){
    const allMet=cl.reqs.every(r=>r.met);
    html+=`<div style="margin-bottom:6px">
      <div style="font-size:.72rem;font-weight:600;color:${allMet?'var(--gold)':'var(--muted)'};margin-bottom:3px">${allMet?'✓ ':''}${cl.label}</div>`;
    for(const r of cl.reqs){
      html+=`<div class="champ-req${r.met?' met':''}"><span class="tick">${r.met?'✓':'○'}</span>${r.label}</div>`;
    }
    html+='</div>';
  }
  html+='</div>';

  return html;
}

function buildRunTable(dogId,evKey,history){
  if(!history||!history.length)return '';
  const sorted=[...history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const isLJ=evKey==='lj',isSS=evKey==='ss',isGJ=evKey==='gj',isFF=evKey==='ff';
  let th='<tr>';
  th+=`<th>Date</th><th>Event</th>`;
  if(isLJ)th+=`<th>Jump</th>`;
  if(isSS)th+=`<th>Time</th>`;
  if(isGJ)th+=`<th>Dist</th>`;
  if(isFF)th+=`<th>Pts</th><th>Time</th>`;
  th+=`<th>Div</th><th>Pl.</th><th>TiPts</th><th>WinPts</th></tr>`;
  let rows='';
  for(const r of sorted){
    const isFinals=r.finals||String(r.event||'').toLowerCase().includes('finals');
    const isRamp=(r.division||'').toLowerCase().includes('ramp');
    let extra='';
    if(isLJ&&r.bestFeet!=null)extra=`${r.bestFeet}'${r.bestInches||0}"`;
    if(isSS&&r.time!=null)extra=`${r.time}s`;
    if(isGJ&&r.best!=null)extra=`${r.best}'`;
    if(isFF){extra=`${r.totalPts||'—'}pts`;}
    rows+=`<tr>
      <td class="hi">${r.date||''}</td>
      <td class="${isFinals?'fin':isRamp?'ramp':''}">${esc(r.event||'')}</td>
      ${isLJ||isSS||isGJ?`<td>${extra}</td>`:isFF?`<td>${extra}</td><td>${r.time!=null?r.time+'s':'—'}</td>`:''}
      <td>${esc(r.division||'—')}</td>
      <td>${r.placement||'—'}</td>
      <td class="${r.pts?'hi':''}">${r.pts||0}</td>
      <td class="${r.win?'hi':''}">${r.win||0}</td>
    </tr>`;
  }
  return `<table class="rt"><thead>${th}</thead><tbody>${rows}</tbody></table>`;
}

function buildShedPanel(dog){
  const shed=dog.shed||{levels:{1:{passes:0,done:false},2:{passes:0,done:false},3:{passes:0,done:false,locked:true},4:{passes:0,done:false,locked:true}},tests:{locate:false,retrieve:false,seasonal:false,multiples:false},winPts:0,trialHistory:[]};
  const levels=shed.levels||{};
  const tests=shed.tests||{};
  const hist=shed.trialHistory||[];

  const LEVEL_NAMES={1:'Level 1 — Locate',2:'Level 2 — Double Retrieve',3:'Level 3 — Hidden Antlers',4:'Level 4 — Quadrant Search'};
  const LEVEL_REQUIRES={3:'L2',4:'L3'};

  let html=`<div class="sec-div">Shed Antler Hunting <a href="https://nationaldogsports.com/shed-antler-hunting" target="_blank">📄 Rules</a></div>`;

  html+=`<div class="shed-levels">`;
  for(let l=1;l<=4;l++){
    const lv=levels[l]||{passes:0,done:false};
    const locked=lv.locked&&!lv.done;
    const passes=lv.passes||0;
    const done=lv.done||passes>=4;
    const p=done?100:pct(passes,4);
    let stat=done?`✓ Titled ${lv.titleDate?`(${lv.titleDate})`:''}`:locked?`🔒 Needs ${LEVEL_REQUIRES[l]}`:`${passes}/4 passes`;
    html+=`<div class="shed-lv">
      <div class="shed-lv-head">
        <span class="shed-lv-name">${LEVEL_NAMES[l]}</span>
        <span class="shed-lv-stat${done?' done':locked?' locked':''}">${stat}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${locked?0:p}%;background:${done?'var(--green)':'linear-gradient(90deg,#6d28d9,var(--purple))'}"></div></div>
    </div>`;
  }
  html+=`</div>`;

  // Trial history table
  if(hist.length){
    const tableId=`${dog.id}-shed-runs`;
    const rows=[...hist].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
      const isQ=String(r.qualifying||'').trim().toUpperCase()==='Y';
      return `<tr>
        <td class="hi">${r.date||''}</td>
        <td>${esc(r.event||'')}</td>
        <td>L${r.level||'?'}</td>
        <td>${esc(r.time||'—')}</td>
        <td class="${isQ?'q-y':'q-n'}">${r.qualifying||'—'}</td>
        <td>${r.placement||'—'}</td>
        <td class="${r.winPts?'hi':''}">${r.winPts||0}</td>
      </tr>`;
    }).join('');
    html+=`<span class="runs-toggle" onclick="toggleRuns('${tableId}',this)">▶ Show ${hist.length} trial run${hist.length>1?'s':''}</span>
    <div class="runs-wrap" id="${tableId}">
      <table class="rt"><thead><tr>
        <th>Date</th><th>Event</th><th>Level</th><th>Time</th><th>Q?</th><th>Pl.</th><th>Win</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }

  // Video tests
  const testCats=Object.keys(SHED_TESTS);
  const allTestsDone=testCats.every(c=>tests[c.toLowerCase()]||tests[c]);
  html+=`<div class="sec-div" style="margin-top:12px">Video Tests (SASV) ${allTestsDone?'<span style="color:var(--green)">✓ Complete</span>':'<span>'+testCats.filter(c=>tests[c.toLowerCase()]||tests[c]).length+'/4 categories</span>'}</div>`;
  html+=`<div class="tests-grid">`;
  for(const cat of testCats){
    const done=tests[cat.toLowerCase()]||tests[cat]||false;
    const elements=SHED_TESTS[cat];
    const elHtml=elements.map(el=>`<div class="test-el${done?' pass':''}"><div class="tel-dot"></div>${esc(el)}</div>`).join('');
    html+=`<div class="test-cat">
      <div class="test-cat-name">${cat} ${done?'✓':''}</div>
      ${elHtml}
    </div>`;
  }
  html+=`</div>`;
  if(shed.winPts)html+=`<div style="margin-top:8px;font-size:.72rem;color:var(--muted)">Shed win pts: <span style="color:var(--purple)">${shed.winPts}</span></div>`;
  return html;
}

function buildTRPanel(dog){
  const tr=dog.timed_recall||{totalPts:0,history:[]};
  const pts=tr.totalPts||0;
  const hist=tr.history||[];
  const cur=currentTitle(pts,TR_TITLES);
  const nxt=nextTitle(pts,TR_TITLES);
  const prevPts=cur?TR_TITLES[TR_TITLES.indexOf(cur)-1]?.pts||0:0;
  const maxPts=nxt?nxt.pts:(cur?cur.pts:200);
  const p=nxt?pct(pts-prevPts,nxt.pts-prevPts):100;
  const bestSpeed=hist.length?Math.max(...hist.map(r=>r.speed||0)):0;
  const bestTime=hist.length?Math.min(...hist.filter(r=>r.time).map(r=>r.time)):null;

  let html=`<div class="sec-div">Timed Recall <a href="https://nationaldogsports.com/timed-recall" target="_blank">📄 Rules</a></div>`;
  html+=`<div class="tr-progress">
    <div class="tr-stat">
      <span class="tr-stat-label">Total Points</span>
      <span class="tr-stat-val">${pts.toFixed(2)}</span>
    </div>
    <div class="bar-track" style="margin-bottom:4px"><div class="bar-fill bar-tr" style="width:${p}%"></div></div>
    <div class="ev-desc">`;
  if(nxt)html+=`${pts.toFixed(1)} pts · need ${(nxt.pts-pts).toFixed(1)} more for ${nxt.name}`;
  else if(cur)html+=`${pts.toFixed(1)} pts · ${cur.name} ✓`;
  else html+=`${pts.toFixed(1)} pts · need ${(TR_TITLES[0].pts-pts).toFixed(1)} more for ${TR_TITLES[0].name}`;
  html+=`</div></div>`;
  if(cur)html+=`<div style="margin-bottom:8px"><span class="b b-tr">${esc(cur.abbr)}</span> <span style="font-size:.72rem;color:var(--muted)">${esc(cur.name)}</span></div>`;
  if(bestSpeed>0||bestTime){
    html+=`<div class="best-row">`;
    if(bestSpeed>0)html+=`<div class="best-chip">Best Speed <span>${bestSpeed.toFixed(2)} km/h</span></div>`;
    if(bestTime)html+=`<div class="best-chip">Best Time <span>${bestTime}s</span></div>`;
    html+=`</div>`;
  }
  if(hist.length){
    const tableId=`${dog.id}-tr-runs`;
    const rows=[...hist].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>`<tr>
      <td class="hi">${r.date||''}</td>
      <td>${esc(r.event||'')}</td>
      <td>${r.time!=null?r.time+'s':'—'}</td>
      <td class="hi">${r.speed!=null?r.speed.toFixed(2):'—'}</td>
      <td>${r.pts!=null?r.pts.toFixed(2):'—'}</td>
      <td>${r.placement||'—'}</td>
    </tr>`).join('');
    html+=`<span class="runs-toggle" onclick="toggleRuns('${tableId}',this)">▶ Show ${hist.length} run${hist.length>1?'s':''}</span>
    <div class="runs-wrap" id="${tableId}">
      <table class="rt"><thead><tr>
        <th>Date</th><th>Event</th><th>Time</th><th>Speed km/h</th><th>Points</th><th>Pl.</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  } else {
    html+=`<div style="font-size:.75rem;color:var(--faint);margin-top:8px">No runs on record</div>`;
  }
  return html;
}

function buildCard(dog){
  const d=dog.dock;
  const totalDockPts=(d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const totalWin=(d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);
  const trPts=(dog.timed_recall||{}).totalPts||0;
  const shed=dog.shed||{};
  const shedPasses=Object.values(shed.levels||{}).reduce((s,l)=>s+(l.passes||0),0);

  const badges=buildBadges(dog);

  const summaryHtml=`<div class="summary-row">
    <div class="s-chip"><div class="val" style="color:var(--blue)">${totalDockPts}</div><div class="lbl">Dock Pts</div></div>
    <div class="s-chip"><div class="val" style="color:var(--gold)">${totalWin}</div><div class="lbl">Win Pts</div></div>
    <div class="s-chip"><div class="val" style="color:var(--purple)">${shedPasses}</div><div class="lbl">Shed Passes</div></div>
    <div class="s-chip"><div class="val" style="color:var(--orange)">${trPts.toFixed(0)}</div><div class="lbl">Recall Pts</div></div>
  </div>`;

  const dockPanel=buildDockPanel(dog);
  const shedPanel=buildShedPanel(dog);
  const trPanel=buildTRPanel(dog);

  const hasShed=shedPasses>0||(shed.trialHistory||[]).length>0;
  const hasTR=trPts>0;
  const defaultTab=hasShed?'dock':'dock';

  return `
    <div class="card-head" onclick="toggleCard(this)">
      <div>
        <div class="dog-name">${esc(dog.name)}</div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:6px">
        <div class="dog-id">#${esc(dog.id)}</div>
        <div class="chevron">▼</div>
      </div>

    <div class="badge-strip">${badges}</div>

      ${summaryHtml}
      <div class="sport-tabs" data-dog="${dog.id}">
        <button class="stab active" data-sport="dock" onclick="switchTab(this)">🌊 Dock Diving</button>
        <button class="stab" data-sport="shed" onclick="switchTab(this)">🦌 Shed Antler</button>
        <button class="stab" data-sport="tr" onclick="switchTab(this)">🏃 Timed Recall</button>
      </div>
      <div class="sport-pane active" data-sport="dock">${dockPanel}</div>
      <div class="sport-pane" data-sport="shed">${shedPanel}</div>
      <div class="sport-pane" data-sport="tr">${trPanel}</div>
    </div>`;

// ── INTERACTIONS ──────────────────────────────
function toggleCard(head){
  head.closest('.dog-card').classList.toggle('expanded');
}
function toggleRuns(id,toggle){
  const wrap=document.getElementById(id);
  if(!wrap)return;
  const open=wrap.classList.toggle('open');
  const cnt=toggle.textContent.replace(/^[▶▼] /,'');
  toggle.textContent=(open?'▼ Hide':' ▶ Show')+' '+cnt.replace(/^(Hide|Show) /,'');
}
function switchTab(btn){
  const card=btn.closest('.dog-card');
  const sport=btn.dataset.sport;
  card.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  card.querySelectorAll('.sport-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  card.querySelector(`.sport-pane[data-sport="${sport}"]`).classList.add('active');
}

function filterCards(){renderGrid();}
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function expandAll(){document.querySelectorAll('.dog-card').forEach(c=>c.classList.add('expanded'));}
function collapseAll(){document.querySelectorAll('.dog-card').forEach(c=>c.classList.remove('expanded'));}

function toggleConfig(){
  document.getElementById('configStrip').classList.toggle('open');
}

// ── RENDER ────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('dogGrid');
  const status=document.getElementById('status');
  const q=document.getElementById('searchBox').value.trim().toLowerCase();

  const shown=ALL_DOGS.filter(dog=>{
    if(q&&!dog.name.toLowerCase().includes(q)&&!dog.id.includes(q))return false;
    if(curFilter==='champion'){
      const names=(dog.titlesEarned||[]).map(t=>t.name.toLowerCase());
      if(!checkChDD(dog).met&&!names.some(n=>n.includes('champion')))return false;
    }
    if(curFilter==='titled'){
      if(!(dog.titlesEarned||[]).length)return false;
    }
    if(curFilter==='shed'){
      const shed=dog.shed||{};
      const passes=Object.values(shed.levels||{}).reduce((s,l)=>s+(l.passes||0),0);
      if(!passes&&!(shed.trialHistory||[]).length)return false;
    }
    if(curFilter==='tr'){
      if(!((dog.timed_recall||{}).totalPts>0))return false;
    }
    return true;
  });

  document.getElementById('dogCount').textContent=shown.length;
  status.style.display='none';
  grid.innerHTML='';

  if(!shown.length){
    status.style.display='';
    status.innerHTML='No dogs match.';
    return;
  }

  for(const dog of shown){
    const card=document.createElement('div');
    card.className='dog-card';
    card.dataset.id=dog.id;
    card.innerHTML=buildCard(dog);
    grid.appendChild(card);
  }
}

function buildTracker(dogs){
  ALL_DOGS=dogs;

}

}

// ── XLSX LOAD ────────────────────────────────────
// SheetJS loaded from CDN — mirrors CWAGS tracker pattern exactly.
// Reads NDS_Master_Data.xlsx from the same directory as this HTML file.

function loadXLSX(url){
  document.getElementById('status').innerHTML='<span class="spin"></span>Loading data…';
  document.getElementById('status').style.display='';
  document.getElementById('dogGrid').innerHTML='';

  fetch(url)
    .then(r=>{
      if(!r.ok)throw new Error('HTTP '+r.status+' — make sure NDS_Master_Data.xlsx is in the same folder as this HTML file');
      return r.arrayBuffer();
    })
    .then(buf=>{
      const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false});
      const dogs  =XLSX.utils.sheet_to_json(wb.Sheets['Dogs']      ||{});
      const ljRows=XLSX.utils.sheet_to_json(wb.Sheets['LongJump']  ||{});
      const ssRows=XLSX.utils.sheet_to_json(wb.Sheets['SpeedSwim'] ||{});
      const gjRows=XLSX.utils.sheet_to_json(wb.Sheets['GrabJump']  ||{});
      const ffRows=XLSX.utils.sheet_to_json(wb.Sheets['FastFetch'] ||{});
      const saRows=XLSX.utils.sheet_to_json(wb.Sheets['ShedAntler']||{});
      const stRows=XLSX.utils.sheet_to_json(wb.Sheets['ShedTests'] ||{});
      const trRows=XLSX.utils.sheet_to_json(wb.Sheets['TimedRecall']||{});
      const teRows=XLSX.utils.sheet_to_json(wb.Sheets['TitlesEarned']||{});
      buildTrackerFromXLSX(dogs,ljRows,ssRows,gjRows,ffRows,saRows,stRows,trRows,teRows);
    })
    .catch(e=>{
      document.getElementById('status').innerHTML='❌ '+e.message;
      document.getElementById('status').style.display='';
    });
}

function buildTrackerFromXLSX(dogRows,ljRows,ssRows,gjRows,ffRows,saRows,stRows,trRows,teRows){
  // Index all event rows by DogID
  function idx(rows,key){
    const m={};
    for(const r of rows){
      const id=String(r[key]||r['DogID']||'').padStart(4,'0');
      if(!m[id])m[id]=[];
      m[id].push(r);
    }
    return m;
  }
  const ljMap=idx(ljRows,'DogID');
  const ssMap=idx(ssRows,'DogID');
  const gjMap=idx(gjRows,'DogID');
  const ffMap=idx(ffRows,'DogID');
  const saMap=idx(saRows,'DogID');
  const stMap=idx(stRows,'DogID');
  const trMap=idx(trRows,'DogID');
  const teMap=idx(teRows,'DogID');

  function sumPts(rows,ptField='TitlePts'){return(rows||[]).reduce((s,r)=>s+(Number(r[ptField])||0),0);}
  function sumWin(rows){return(rows||[]).reduce((s,r)=>s+(Number(r['WinPts'])||0),0);}

  const dogs=dogRows.map(d=>{
    const id=String(d['DogID']||'').padStart(4,'0');
    if(!id||id==='0000')return null;
    const lj=ljMap[id]||[];
    const ss=ssMap[id]||[];
    const gj=gjMap[id]||[];
    const ff=ffMap[id]||[];
    const sa=saMap[id]||[];
    const st=stMap[id]||[];
    const tr=trMap[id]||[];
    const te=teMap[id]||[];

    // Shed levels: count qualifying passes per level
    const shedLevels={};
    for(let l=1;l<=4;l++){
      const passes=sa.filter(r=>Number(r['Level'])===l&&String(r['Qualifying']||'').trim().toUpperCase()==='Y').length;
      const done=passes>=4;
      const titleRow=te.find(r=>`L${l}`==='' && done); // title date from TitlesEarned if available
      const titleDateRow=te.find(r=>String(r['TitleName']||'').toLowerCase().includes(`l${l}`)||
        (l===1&&String(r['TitleName']||'').toLowerCase().includes('locate'))||
        (l===2&&String(r['TitleName']||'').toLowerCase().includes('retrieve'))||
        (l===3&&String(r['TitleName']||'').toLowerCase().includes('hidden')||String(r['TitleName']||'').toLowerCase().includes('shed hunter'))||
        (l===4&&String(r['TitleName']||'').toLowerCase().includes('quadrant')||String(r['TitleName']||'').toLowerCase().includes('shed master'))
      );
      shedLevels[l]={passes,done,titleDate:titleDateRow?titleDateRow['Date']:'',locked:l>=3&&!shedLevels[2]?.done};
    }
    shedLevels[3].locked=!shedLevels[2].done;
    shedLevels[4].locked=!shedLevels[3].done;

    // Shed tests: check by category in ShedTests sheet
    const cats={locate:false,retrieve:false,seasonal:false,multiples:false};
    for(const row of st){
      const cat=String(row['Category']||'').toLowerCase();
      if(String(row['Result']||'').toLowerCase()==='pass'&&cats.hasOwnProperty(cat))cats[cat]=true;
    }

    // Build history arrays matching the JSON structure the renderer expects
    function ljHist(rows){return rows.map(r=>({
      date:r['Date']||'',event:r['Event']||'',
      bestFeet:r['BestFt']||null,bestInches:r['BestIn']||null,
      division:r['Division']||'',placement:r['Placement']||null,
      pts:Number(r['TitlePts'])||0,win:Number(r['WinPts'])||0,
      finals:r['Finals']==='TRUE'||r['Finals']===true,
    }));}
    function ssHist(rows){return rows.map(r=>({
      date:r['Date']||'',event:r['Event']||'',
      time:r['Time1']!==''?Number(r['Time1'])||null:null,
      division:r['Division']||'',placement:r['Placement']||null,
      pts:Number(r['TitlePts'])||0,win:Number(r['WinPts'])||0,
    }));}
    function gjHist(rows){return rows.map(r=>({
      date:r['Date']||'',event:r['Event']||'',
      best:r['Best']!==''?Number(r['Best'])||null:null,
      division:r['Division']||'',placement:r['Placement']||null,
      pts:Number(r['TitlePts'])||0,win:Number(r['WinPts'])||0,
    }));}
    function ffHist(rows){return rows.map(r=>({
      date:r['Date']||'',event:r['Event']||'',
      totalPts:r['TotalPts']!==''?Number(r['TotalPts'])||null:null,
      time:r['Time']!==''?Number(r['Time'])||null:null,
      division:r['Division']||'',placement:r['Placement']||null,
      pts:Number(r['TitlePts'])||0,win:Number(r['WinPts'])||0,
    }));}

    // Best LJ dist
    const ljBests=lj.filter(r=>r['BestFt']&&Number(r['BestFt'])>0);
    const ljBest=ljBests.length?ljBests.reduce((b,r)=>Number(r['BestFt'])*12+Number(r['BestIn']||0)>Number(b['BestFt'])*12+Number(b['BestIn']||0)?r:b,ljBests[0]):null;
    const ssBests=ss.filter(r=>r['Time1']&&Number(r['Time1'])>0);
    const ssBest=ssBests.length?ssBests.reduce((b,r)=>Number(r['Time1'])<Number(b['Time1'])?r:b,ssBests[0]):null;
    const gjBests=gj.filter(r=>r['Best']&&Number(r['Best'])>0);
    const gjBest=gjBests.length?gjBests.reduce((b,r)=>Number(r['Best'])>Number(b['Best'])?r:b,gjBests[0]):null;
    const ffBests=ff.filter(r=>r['TotalPts']&&Number(r['TotalPts'])>0);
    const ffBest=ffBests.length?ffBests.reduce((b,r)=>Number(r['TotalPts'])>Number(b['TotalPts'])?r:b,ffBests[0]):null;

    const trTotal=tr.reduce((s,r)=>s+(Number(r['Points'])||0),0);
    const trHist=tr.map(r=>({
      date:r['Date']||'',event:r['Event']||'',
      time:Number(r['Time'])||null,
      speed:Number(r['SpeedKMH'])||null,
      pts:Number(r['Points'])||0,
      placement:r['Placement']||null,
    }));

    return {
      id,
      name:d['Name']||'Unknown',
      owner:d['Owner']||'',
      breed:d['Breed']||'',
      sizeClass:d['SizeClass']||'Open',
      dock:{
        lj:{titlePts:sumPts(lj),winPts:sumWin(lj),personalBest:ljBest?`${ljBest['BestFt']}'${ljBest['BestIn']||0}"`:null,history:ljHist(lj)},
        ss:{titlePts:sumPts(ss),winPts:sumWin(ss),personalBest:ssBest?`${ssBest['Time1']}s`:null,history:ssHist(ss)},
        gj:{titlePts:sumPts(gj),winPts:sumWin(gj),personalBest:gjBest?`${gjBest['Best']}'`:null,history:gjHist(gj)},
        ff:{titlePts:sumPts(ff),winPts:sumWin(ff),personalBest:ffBest?`${ffBest['TotalPts']}pts`:null,history:ffHist(ff)},
      },
      shed:{levels:shedLevels,tests:cats,winPts:sumWin(sa),trialHistory:sa.map(r=>({
        date:r['Date']||'',event:r['Event']||'',level:Number(r['Level'])||1,
        time:r['TotalTime']||r['RunningTime']||'',
        qualifying:r['Qualifying']||'',placement:r['Placement']||'',
        winPts:Number(r['WinPts'])||0,
      }))},
      timed_recall:{totalPts:trTotal,history:trHist},
      titlesEarned:te.map(r=>({name:r['TitleName']||'',division:r['Division']||'',date:r['Date']||'',sport:r['Sport']||'Dock'})),
    };
  }).filter(Boolean);

  buildTracker(dogs);
}

// ── INIT ──────────────────────────────────────
(function init(){
  const saved=localStorage.getItem('nds_xlsx_url');
  if(saved){
    document.getElementById('jsonUrl').value=saved;
  }
  // Always try loading from same directory first
  loadXLSX('NDS_Master_Data.xlsx');
})();
</script>
