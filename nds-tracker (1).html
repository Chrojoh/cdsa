<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NDS Title Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE6;--border:#E2DDD5;
  --text:#1A1714;--muted:#6B6560;--accent:#2E5F3D;--accent-light:#E8F2EB;
  --gold:#C8860A;--gold-light:#FDF3DC;--blue:#1B4F8A;--blue-light:#E8EFF8;
  --red:#963030;--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* HEADER */
.header{background:var(--accent);padding:20px 16px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header h1{font-family:'DM Serif Display',serif;color:#fff;font-size:22px;font-weight:400;letter-spacing:-0.3px;}
.header-sub{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px;}
.reload-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;cursor:pointer;padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:5px;transition:background 0.2s;}
.reload-btn:hover{background:rgba(255,255,255,0.25);}
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 14px 10px 38px;outline:none;transition:background 0.2s;}
.search-wrap input::placeholder{color:rgba(255,255,255,0.6);}
.search-wrap input:focus{background:rgba(255,255,255,0.22);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.7);font-size:16px;pointer-events:none;}

/* MAIN */
main{padding:16px;}

/* STATUS */
.status{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.status.loading{color:var(--blue);}
.status.error{color:var(--red);}
.status.success{color:var(--accent);}
.status-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* CONFIG */
.config-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.config-panel h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:12px;}
.config-row{margin-bottom:10px;}
.config-row label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px;}
.config-row input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;background:var(--bg);color:var(--text);outline:none;}
.config-row input:focus{border-color:var(--accent);}
.config-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.btn{border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:10px 14px;text-align:center;transition:all 0.15s;border:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#245030;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.demo-note{font-size:12px;color:var(--muted);margin-top:8px;padding:8px 10px;background:var(--gold-light);border-radius:var(--radius-sm);line-height:1.5;}

/* DOG LIST */
.section-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px;}
.dog-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.dog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s;}
.dog-card:hover{border-color:var(--accent);}
.dog-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.dog-card-header:active{background:var(--surface2);}
.dog-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;}
.dog-info{flex:1;min-width:0;}
.dog-name{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:-0.2px;}
.dog-id{font-size:12px;color:var(--muted);margin-top:1px;}
.dog-titles-preview{display:flex;flex-wrap:wrap;gap:4px;padding:0 16px 14px;}
.title-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;}
.badge-champion{background:var(--gold-light);color:#7A5000;}
.badge-expert{background:var(--blue-light);color:#0D3566;}
.badge-advanced{background:var(--accent-light);color:#1A4527;}
.badge-basic{background:var(--surface2);color:var(--muted);}
.badge-shed{background:#F0EAF8;color:#5C2D8A;}
.chevron{color:var(--muted);font-size:16px;}

/* DOG DETAIL */
.dog-detail{display:none;border-top:1px solid var(--border);}
.dog-detail.open{display:block;}

/* SPORT SECTION */
.sport-section{border-bottom:1px solid var(--border);padding:16px;}
.sport-section:last-child{border-bottom:none;}
.sport-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sport-title-group{display:flex;align-items:center;gap:8px;}
.sport-name{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
.sport-rules-link{font-size:11px;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:20px;padding:2px 8px;white-space:nowrap;transition:all 0.15s;}
.sport-rules-link:hover{background:var(--accent);color:#fff;}
.sport-pts{font-size:13px;font-weight:500;color:var(--accent);}

/* EVENT ROW */
.event-row{margin-bottom:14px;}
.event-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.event-name-group{display:flex;align-items:center;gap:8px;}
.event-label{font-size:15px;font-weight:500;}
.event-rules-link{font-size:11px;color:var(--blue);text-decoration:none;opacity:0.8;transition:opacity 0.15s;}
.event-rules-link:hover{opacity:1;text-decoration:underline;}
.event-pts-label{font-size:12px;color:var(--muted);font-weight:400;}

/* PROGRESS */
.progress-context{font-size:13px;color:var(--text);margin-bottom:5px;line-height:1.5;}
.progress-context strong{font-weight:600;}
.progress-context .next-title-name{color:var(--accent);font-weight:500;}
.progress-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:4px;}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.fill-basic{background:#AAA47A;}
.fill-advanced{background:var(--accent);}
.fill-expert{background:var(--blue);}
.fill-champion{background:var(--gold);}
.fill-specialist{background:var(--red);}
.progress-subtext{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}

/* DETAILS BUTTON + TABLE */
.details-toggle{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);margin-top:6px;width:100%;transition:background 0.15s;}
.details-toggle:hover{background:var(--border);}
.details-toggle .toggle-icon{margin-left:auto;font-size:12px;}
.details-table-wrap{display:none;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.details-table-wrap.open{display:block;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;background:var(--surface2);border-bottom:1px solid var(--border);}
td{padding:7px 10px;border-bottom:0.5px solid var(--surface2);color:var(--text);}
tr:last-child td{border-bottom:none;}
.win-badge{font-size:10px;background:var(--gold-light);color:#7A5000;padding:1px 5px;border-radius:10px;font-weight:600;}
.div-tag{font-size:10px;background:var(--surface2);color:var(--muted);padding:1px 5px;border-radius:4px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:2px;}
.stat-val{font-size:15px;font-weight:500;}

/* CHAMPION CARDS */
.champion-section-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin:14px 0 8px;}
.champion-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.champion-card.earned{background:var(--gold-light);border-color:#D4A83A;}
.champion-card.not-earned{background:var(--surface2);}
.champion-title-name{font-size:14px;font-weight:600;margin-bottom:8px;}
.req-line{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px;}
.req-check{font-size:14px;width:18px;flex-shrink:0;}
.req-text{flex:1;color:var(--text);}
.req-val{font-weight:500;font-size:12px;}
.req-met .req-check{color:var(--accent);}
.req-met .req-val{color:var(--accent);}
.req-unmet .req-check{color:var(--muted);}
.req-unmet .req-val{color:var(--muted);}

/* SHED */
.shed-level{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.shed-level-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;margin-top:1px;}
.level-done{background:var(--accent);color:#fff;}
.level-inprog{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold);}
.level-locked{background:var(--surface2);color:var(--muted);}
.shed-level-info{flex:1;}
.shed-level-name{font-size:14px;font-weight:500;}
.shed-level-detail{font-size:12px;color:var(--muted);margin-top:2px;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}
.empty h3{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--text);}
.empty p{font-size:14px;line-height:1.5;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>NDS Tracker</h1>
      <div class="header-sub">National Dog Sports</div>
    </div>
    <button class="reload-btn" onclick="loadData()">&#8635; Reload</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search by name or dog ID..." oninput="filterDogs()">
  </div>
</div>

<main>
  <div id="statusBar" class="status loading">
    <div class="status-dot"></div>
    <span id="statusText">Loading data...</span>
  </div>



  <div id="dogListWrap">
    <div id="sectionLabel" class="section-label" style="display:none;"></div>
    <div id="dogList" class="dog-list"></div>
  </div>
</main>

<script>
// ── RULES PAGE LINKS ──────────────────────────────────────────────────────────
const RULES_LINKS = {
  dock:       'https://nationaldogsports.com/dock-diving',
  longjump:   'https://nationaldogsports.com/dock-diving',
  speedswim:  'https://nationaldogsports.com/dock-diving',
  grabjump:   'https://nationaldogsports.com/dock-diving',
  fastfetch:  'https://nationaldogsports.com/dock-diving',
  shed:       'https://nationaldogsports.com/shed-antler-hunting',
  timedrecall:'https://nationaldogsports.com/timed-recall',
};

// ── TITLE THRESHOLDS ──────────────────────────────────────────────────────────
const LJ_THRESHOLDS = [
  {name:'Dock Diver',abbr:'DD',pts:55,tier:'basic'},
  {name:'Advanced Long Jump',abbr:'ADD',pts:205,tier:'advanced'},
  {name:'Expert Long Jump',abbr:'EDD',pts:455,tier:'expert'},
  {name:'Specialist Long Jump',abbr:'SDD',pts:955,tier:'specialist'},
  {name:'Specialist Long Jump II',abbr:'SDD II',pts:1205,tier:'specialist'},
  {name:'Specialist Long Jump III',abbr:'SDD III',pts:1455,tier:'specialist'},
];
function OTHER(prefix,label){return [
  {name:label,abbr:prefix,pts:45,tier:'basic'},
  {name:'Advanced '+label,abbr:'A'+prefix,pts:145,tier:'advanced'},
  {name:'Expert '+label,abbr:'E'+prefix,pts:345,tier:'expert'},
  {name:'Specialist '+label,abbr:'S'+prefix,pts:545,tier:'specialist'},
  {name:'Specialist '+label+' II',abbr:'S'+prefix+'II',pts:645,tier:'specialist'},
];}
const SS_THRESHOLDS = OTHER('SS','Speed Swim');
const GJ_THRESHOLDS = OTHER('GJ','Grab Jump');
const FF_THRESHOLDS = OTHER('FF','Fast Fetch');
const CHAMPION_TITLES = [
  {name:'Champion Dock Diver',abbr:'ChDD',tier:'champion',reqs:{totalPts:200,winPts:5,basicAll:true}},
  {name:'Grand Champion Dock Diver',abbr:'GChDD',tier:'champion',reqs:{totalPts:500,winPts:15,eachEvent:100}},
  {name:'Supreme Champion Dock Diver',abbr:'SChDD',tier:'champion',reqs:{totalPts:1000,winPts:25,advancedAll:true}},
];
const SHED_LEVELS = [
  {num:1,name:'Locate',required:4},
  {num:2,name:'Double Retrieve',required:4},
  {num:3,name:'Hidden Antlers',required:4},
  {num:4,name:'Quadrant Search',required:4},
];
const TR_THRESHOLDS = [
  {name:'Novice Recaller',abbr:'NR',pts:200},
  {name:'Advanced Recaller',abbr:'AR',pts:500},
  {name:'Master Recaller',abbr:'MR',pts:1000},
  {name:'Expert Recaller',abbr:'ER',pts:1500},
  {name:'Specialist Recaller',abbr:'SR',pts:2000},
];

// ── DEMO DATA (Gabby #0004) ───────────────────────────────────────────────────

// ── STATE ─────────────────────────────────────────────────────────────────────
let allDogs = [];
let expandedCards = {};
let openDetails = {};

// ── TITLE LOGIC ───────────────────────────────────────────────────────────────
function getTitlesEarned(pts, thresholds) {
  return thresholds.filter(t => pts >= t.pts);
}
function getNextTitle(pts, thresholds) {
  return thresholds.find(t => pts < t.pts) || null;
}
function badgeTier(tier) {
  if (tier==='champion') return 'badge-champion';
  if (tier==='expert'||tier==='specialist') return 'badge-expert';
  if (tier==='advanced') return 'badge-advanced';
  return 'badge-basic';
}
function tierFill(tier) {
  if (tier==='champion') return 'fill-champion';
  if (tier==='specialist') return 'fill-specialist';
  if (tier==='expert') return 'fill-expert';
  if (tier==='advanced') return 'fill-advanced';
  return 'fill-basic';
}
function checkChampion(dog, title) {
  const d = dog.dock;
  const totalPts = (d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const totalWin = (d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);
  const hasBasicLJ = d.lj.titlePts>=55, hasBasicSS = d.ss.titlePts>=45;
  const hasBasicGJ = d.gj.titlePts>=45, hasBasicFF = d.ff.titlePts>=45;
  const hasAllBasic = hasBasicLJ&&hasBasicSS&&hasBasicGJ&&hasBasicFF;
  const hasAdvLJ = d.lj.titlePts>=205, hasAdvSS = d.ss.titlePts>=145;
  const hasAdvGJ = d.gj.titlePts>=145, hasAdvFF = d.ff.titlePts>=145;
  const hasAllAdv = hasAdvLJ&&hasAdvSS&&hasAdvGJ&&hasAdvFF;
  if (title.reqs.basicAll) return {
    'Total points (need 200)': {met:totalPts>=200,val:totalPts,req:200},
    'Win points (need 5)': {met:totalWin>=5,val:totalWin,req:5},
    'Basic title in all 4 events': {met:hasAllBasic,val:hasAllBasic?'✓ Complete':`LJ:${hasBasicLJ?'✓':'✗'} SS:${hasBasicSS?'✓':'✗'} GJ:${hasBasicGJ?'✓':'✗'} FF:${hasBasicFF?'✓':'✗'}`,req:''},
  };
  if (title.reqs.eachEvent) return {
    'Total points (need 500)': {met:totalPts>=500,val:totalPts,req:500},
    'Win points (need 15)': {met:totalWin>=15,val:totalWin,req:15},
    '100+ pts each event': {met:d.lj.titlePts>=100&&d.ss.titlePts>=100&&d.gj.titlePts>=100&&d.ff.titlePts>=100,val:`LJ:${d.lj.titlePts} SS:${d.ss.titlePts} GJ:${d.gj.titlePts} FF:${d.ff.titlePts}`,req:''},
  };
  return {
    'Total points (need 1000)': {met:totalPts>=1000,val:totalPts,req:1000},
    'Win points (need 25)': {met:totalWin>=25,val:totalWin,req:25},
    'Advanced title all 4 events': {met:hasAllAdv,val:hasAllAdv?'✓ Complete':`LJ:${hasAdvLJ?'✓':'✗'} SS:${hasAdvSS?'✓':'✗'} GJ:${hasAdvGJ?'✓':'✗'} FF:${hasAdvFF?'✓':'✗'}`,req:''},
  };
}

// ── PROGRESS BAR RENDERER ─────────────────────────────────────────────────────
function renderProgressBlock(pts, thresholds, eventLabel, rulesKey, detailId, historyHtml) {
  const earned = getTitlesEarned(pts, thresholds);
  const next = getNextTitle(pts, thresholds);
  const current = earned.length ? earned[earned.length-1] : null;
  const prevPts = current ? current.pts : 0;
  const totalNeeded = next ? next.pts : (current ? current.pts : 0);
  const pct = next ? Math.min(100, Math.round(((pts-prevPts)/(next.pts-prevPts))*100)) : 100;
  const fClass = next ? tierFill(next.tier) : (current ? tierFill(current.tier) : 'fill-basic');
  const currentBadge = current ? `<span class="title-badge ${badgeTier(current.tier)}" style="font-size:10px;padding:2px 7px;margin-left:6px;">${current.abbr}</span>` : '';
  const rulesLink = RULES_LINKS[rulesKey] || RULES_LINKS['dock'];
  const isOpen = openDetails[detailId];

  // The descriptive progress sentence
  let progressSentence = '';
  if (!next) {
    progressSentence = `<span style="color:var(--accent);font-weight:500;">All titles earned!</span> ${pts} total points.`;
  } else {
    const ptsNeeded = next.pts - pts;
    progressSentence = `<strong>${pts}</strong> of <strong>${next.pts}</strong> pts &nbsp;·&nbsp; <strong>${ptsNeeded} pts needed</strong> for <span class="next-title-name">${next.name}</span>`;
    if (current) progressSentence += `<span style="color:var(--muted);font-size:12px;"> &nbsp;(currently: ${current.name})</span>`;
  }

  return `<div class="event-row">
    <div class="event-header-row">
      <div class="event-name-group">
        <span class="event-label">${eventLabel}</span>${currentBadge}
        <a class="event-rules-link" href="${rulesLink}" target="_blank" rel="noopener">&#128196; Rules</a>
      </div>
    </div>
    <div class="progress-context">${progressSentence}</div>
    <div class="progress-track"><div class="progress-fill ${fClass}" style="width:${pct}%"></div></div>
    <div class="progress-subtext">
      <span>${prevPts} pts</span>
      <span>${pct}%</span>
      <span>${next ? next.pts + ' pts' : '✓'}</span>
    </div>
    <button class="details-toggle" onclick="toggleDetails('${detailId}')">
      <span>&#128203; Show all runs (${historyHtml.count})</span>
      <span class="toggle-icon" id="dtoggle-${detailId}">${isOpen?'▲':'▼'}</span>
    </button>
    <div class="details-table-wrap ${isOpen?'open':''}" id="${detailId}">
      ${historyHtml.html}
    </div>
  </div>`;
}

function buildDockHistory(history, cols) {
  if (!history || !history.length) return {count:0, html:'<p style="padding:10px;font-size:13px;color:var(--muted);">No runs recorded yet.</p>'};
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  let rows = sorted.map(r => {
    const winCell = r.win && r.win > 0 ? `<span class="win-badge">+${r.win} win</span>` : '';
    const totalPts = (r.pts||0) + (r.win||0);
    return `<tr>
      <td>${r.date ? r.date.slice(0,10) : '—'}</td>
      <td>${r.event||'—'}</td>
      <td><span class="div-tag">${r.division||'—'}</span></td>
      <td>${r.placement||'—'}</td>
      <td>${totalPts} ${winCell}</td>
    </tr>`;
  }).join('');
  const html = `<table><thead><tr><th>Date</th><th>Event</th><th>Div</th><th>Pl.</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
  return {count: sorted.length, html};
}

function buildShedHistory(history) {
  if (!history || !history.length) return {count:0, html:'<p style="padding:10px;font-size:13px;color:var(--muted);">No runs recorded yet.</p>'};
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  let rows = sorted.map(r => {
    const qBadge = r.qualifying==='Y' ? `<span style="color:var(--accent);font-weight:600;">Q</span>` : `<span style="color:var(--red);">NQ</span>`;
    const winCell = r.winPts && r.winPts > 0 ? `<span class="win-badge">+${r.winPts}</span>` : '';
    return `<tr>
      <td>${r.date||'—'}</td>
      <td>${r.event||'—'}</td>
      <td>L${r.level||'—'}</td>
      <td>${r.time||'—'}</td>
      <td>${qBadge} ${r.placement||''} ${winCell}</td>
    </tr>`;
  }).join('');
  const html = `<table><thead><tr><th>Date</th><th>Event</th><th>Lvl</th><th>Time</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table>`;
  return {count: sorted.length, html};
}

// ── SECTION RENDERERS ─────────────────────────────────────────────────────────
function renderDockSection(dog) {
  const d = dog.dock;
  const totalPts = (d.lj.titlePts||0)+(d.ss.titlePts||0)+(d.gj.titlePts||0)+(d.ff.titlePts||0);
  const totalWin = (d.lj.winPts||0)+(d.ss.winPts||0)+(d.gj.winPts||0)+(d.ff.winPts||0);

  const ljHist = buildDockHistory(d.lj.history);
  const ssHist = buildDockHistory(d.ss.history);
  const gjHist = buildDockHistory(d.gj.history);
  const ffHist = buildDockHistory(d.ff.history);

  let champHtml = '';
  for (const ct of CHAMPION_TITLES) {
    const reqs = checkChampion(dog, ct);
    const allMet = Object.values(reqs).every(r => r.met);
    champHtml += `<div class="champion-card ${allMet?'earned':'not-earned'}">
      <div class="champion-title-name">${allMet?'🏆 ':''}${ct.name} <span style="font-size:11px;font-weight:400;color:var(--muted);">(${ct.abbr})</span></div>`;
    for (const [label, v] of Object.entries(reqs)) {
      const met = v.met;
      champHtml += `<div class="req-line ${met?'req-met':'req-unmet'}">
        <span class="req-check">${met?'✓':'○'}</span>
        <span class="req-text">${label}</span>
        <span class="req-val">${v.val}</span>
      </div>`;
    }
    champHtml += `</div>`;
  }

  return `<div class="sport-section">
    <div class="sport-header">
      <div class="sport-title-group">
        <span class="sport-name">🏊 Dock Diving</span>
        <a class="sport-rules-link" href="${RULES_LINKS.dock}" target="_blank" rel="noopener">Official Rules</a>
      </div>
      <span class="sport-pts">${totalPts} pts · ${totalWin} wins</span>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">Best Jump</div><div class="stat-val">${d.lj.personalBest||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Best Swim</div><div class="stat-val">${d.ss.personalBest||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Best Grab</div><div class="stat-val">${d.gj.personalBest||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Best Fetch</div><div class="stat-val">${d.ff.personalBest||'—'}</div></div>
    </div>
    ${renderProgressBlock(d.lj.titlePts||0, LJ_THRESHOLDS, 'Long Jump', 'longjump', `dtbl-${dog.id}-lj`, ljHist)}
    ${renderProgressBlock(d.ss.titlePts||0, SS_THRESHOLDS, 'Speed Swim', 'speedswim', `dtbl-${dog.id}-ss`, ssHist)}
    ${renderProgressBlock(d.gj.titlePts||0, GJ_THRESHOLDS, 'Grab Jump', 'grabjump', `dtbl-${dog.id}-gj`, gjHist)}
    ${renderProgressBlock(d.ff.titlePts||0, FF_THRESHOLDS, 'Fast Fetch', 'fastfetch', `dtbl-${dog.id}-ff`, ffHist)}
    <div class="champion-section-label">Champion Title Progress</div>
    ${champHtml}
  </div>`;
}

function renderShedSection(dog) {
  if (!dog.shed) return '';
  const s = dog.shed;
  let levelsHtml = '';
  for (const level of SHED_LEVELS) {
    const data = s.levels[String(level.num)] || {passes:0,done:false};
    const locked = data.locked && !s.levels[String(level.num-1)]?.done;
    let cls = locked ? 'level-locked' : data.done ? 'level-done' : 'level-inprog';
    const passesNeeded = level.required - (data.passes||0);
    let detail = '';
    if (data.done) detail = `Title earned · ${data.titleDate||''}`;
    else if (locked) detail = `Requires Level ${level.num-1} title first`;
    else detail = `${data.passes||0} of ${level.required} qualifying runs · ${passesNeeded > 0 ? passesNeeded + ' more needed' : 'title pending'}`;
    levelsHtml += `<div class="shed-level">
      <div class="shed-level-num ${cls}">${data.done?'✓':level.num}</div>
      <div class="shed-level-info">
        <div class="shed-level-name">Level ${level.num} — ${level.name}</div>
        <div class="shed-level-detail">${detail}</div>
      </div>
    </div>`;
  }
  const testItems = ['locate','retrieve','seasonal','multiples'];
  const testDone = testItems.filter(t => s.tests&&s.tests[t]).length;
  const svBadge = testDone===4 ? '<span class="title-badge badge-shed" style="margin-left:8px;">Skills Verified</span>' : `<span style="font-size:12px;color:var(--muted);margin-left:8px;">${testDone}/4 complete</span>`;

  const shedHist = buildShedHistory(s.trialHistory);
  const isOpen = openDetails[`dtbl-${dog.id}-shed`];

  return `<div class="sport-section">
    <div class="sport-header">
      <div class="sport-title-group">
        <span class="sport-name">🦌 Shed Antler</span>
        <a class="sport-rules-link" href="${RULES_LINKS.shed}" target="_blank" rel="noopener">Official Rules</a>
      </div>
      <span class="sport-pts">${s.winPts||0} win pts</span>
    </div>
    ${levelsHtml}
    <div style="display:flex;align-items:center;margin:10px 0 8px;">
      <span style="font-size:13px;font-weight:500;">Video Tests</span>${svBadge}
    </div>
    <div class="stats-row">
      ${testItems.map(t=>`<div class="stat-box"><div class="stat-label" style="text-transform:capitalize">${t}</div><div class="stat-val" style="font-size:13px;color:${s.tests&&s.tests[t]?'var(--accent)':'var(--muted)'}">${s.tests&&s.tests[t]?'✓ Pass':'Pending'}</div></div>`).join('')}
    </div>
    <button class="details-toggle" onclick="toggleDetails('dtbl-${dog.id}-shed')">
      <span>&#128203; Show all trial runs (${shedHist.count})</span>
      <span class="toggle-icon" id="dtoggle-dtbl-${dog.id}-shed">${isOpen?'▲':'▼'}</span>
    </button>
    <div class="details-table-wrap ${isOpen?'open':''}" id="dtbl-${dog.id}-shed">
      ${shedHist.html}
    </div>
  </div>`;
}

function renderTimedRecall(dog) {
  if (!dog.timed_recall) return '';
  const tr = dog.timed_recall;
  const earned = TR_THRESHOLDS.filter(t => tr.totalPts >= t.pts);
  const next = TR_THRESHOLDS.find(t => tr.totalPts < t.pts) || null;
  const current = earned.length ? earned[earned.length-1] : null;
  const prevPts = current ? current.pts : 0;
  const pct = next ? Math.min(100,Math.round(((tr.totalPts-prevPts)/(next.pts-prevPts))*100)) : 100;
  const currentBadge = current ? `<span class="title-badge badge-advanced" style="font-size:10px;padding:2px 7px;margin-left:6px;">${current.abbr}</span>` : '';
  const isOpen = openDetails[`dtbl-${dog.id}-tr`];

  let progressSentence = '';
  if (!next) {
    progressSentence = `<span style="color:var(--accent);font-weight:500;">All titles earned!</span> ${tr.totalPts.toFixed(1)} total points.`;
  } else {
    const needed = (next.pts - tr.totalPts).toFixed(1);
    progressSentence = `<strong>${tr.totalPts.toFixed(1)}</strong> of <strong>${next.pts}</strong> pts &nbsp;·&nbsp; <strong>${needed} pts needed</strong> for <span class="next-title-name">${next.name}</span>`;
    if (current) progressSentence += `<span style="color:var(--muted);font-size:12px;"> &nbsp;(currently: ${current.name})</span>`;
  }

  const sorted = [...(tr.history||[])].sort((a,b)=>b.date.localeCompare(a.date));
  let trRows = sorted.map(r=>`<tr>
    <td>${r.date||'—'}</td>
    <td>${r.event||'—'}</td>
    <td>${r.time||'—'}s</td>
    <td>${r.speed ? r.speed.toFixed(2)+' km/h' : '—'}</td>
    <td>${r.pts ? r.pts.toFixed(2) : '—'}</td>
    <td>${r.placement||'—'}</td>
  </tr>`).join('');
  const trTable = `<table><thead><tr><th>Date</th><th>Event</th><th>Time</th><th>Speed</th><th>Pts</th><th>Pl.</th></tr></thead><tbody>${trRows}</tbody></table>`;

  return `<div class="sport-section">
    <div class="sport-header">
      <div class="sport-title-group">
        <span class="sport-name">⚡ Timed Recall</span>
        <a class="sport-rules-link" href="${RULES_LINKS.timedrecall}" target="_blank" rel="noopener">Official Rules</a>
      </div>
      <span class="sport-pts">${tr.totalPts.toFixed(1)} pts</span>
    </div>
    <div class="event-row">
      <div class="event-header-row">
        <div class="event-name-group">
          <span class="event-label">100m Track</span>${currentBadge}
        </div>
      </div>
      <div class="progress-context">${progressSentence}</div>
      <div class="progress-track"><div class="progress-fill fill-advanced" style="width:${pct}%"></div></div>
      <div class="progress-subtext"><span>${prevPts} pts</span><span>${pct}%</span><span>${next?next.pts+' pts':'✓'}</span></div>
      <button class="details-toggle" onclick="toggleDetails('dtbl-${dog.id}-tr')">
        <span>&#128203; Show all runs (${sorted.length})</span>
        <span class="toggle-icon" id="dtoggle-dtbl-${dog.id}-tr">${isOpen?'▲':'▼'}</span>
      </button>
      <div class="details-table-wrap ${isOpen?'open':''}" id="dtbl-${dog.id}-tr">
        ${trTable}
      </div>
    </div>
  </div>`;
}

// ── DOG CARD ──────────────────────────────────────────────────────────────────
function getAllBadges(dog) {
  const badges = [];
  if (dog.dock) {
    const d = dog.dock;
    for (const ct of [...CHAMPION_TITLES].reverse()) {
      const reqs = checkChampion(dog, ct);
      if (Object.values(reqs).every(r=>r.met)) { badges.push({label:ct.abbr,cls:'badge-champion'}); break; }
    }
    const ljE = getTitlesEarned(d.lj.titlePts||0, LJ_THRESHOLDS);
    if (ljE.length) badges.push({label:ljE[ljE.length-1].abbr,cls:badgeTier(ljE[ljE.length-1].tier)});
    const ssE = getTitlesEarned(d.ss.titlePts||0, SS_THRESHOLDS);
    if (ssE.length) badges.push({label:ssE[ssE.length-1].abbr,cls:badgeTier(ssE[ssE.length-1].tier)});
    const gjE = getTitlesEarned(d.gj.titlePts||0, GJ_THRESHOLDS);
    if (gjE.length) badges.push({label:gjE[gjE.length-1].abbr,cls:badgeTier(gjE[gjE.length-1].tier)});
    const ffE = getTitlesEarned(d.ff.titlePts||0, FF_THRESHOLDS);
    if (ffE.length) badges.push({label:ffE[ffE.length-1].abbr,cls:badgeTier(ffE[ffE.length-1].tier)});
  }
  if (dog.shed) {
    if (dog.shed.levels[2]?.done) badges.push({label:'SH L2',cls:'badge-shed'});
    if (dog.shed.tests?.multiples) badges.push({label:'Shed SV',cls:'badge-shed'});
  }
  if (dog.timed_recall) {
    const trE = TR_THRESHOLDS.filter(t => dog.timed_recall.totalPts >= t.pts);
    if (trE.length) badges.push({label:trE[trE.length-1].abbr,cls:'badge-basic'});
  }
  return badges.slice(0,6);
}

function renderDogCard(dog) {
  const initials = dog.name.slice(0,2).toUpperCase();
  const isOpen = expandedCards[dog.id];
  const badges = getAllBadges(dog);
  return `<div class="dog-card" id="card-${dog.id}">
    <div class="dog-card-header" onclick="toggleCard('${dog.id}')">
      <div class="dog-avatar">${initials}</div>
      <div class="dog-info">
        <div class="dog-name">${dog.name}</div>
        <div class="dog-id">ID: ${dog.id}${dog.owner?' · '+dog.owner:''}</div>
      </div>
      <div class="chevron" id="chev-${dog.id}">${isOpen?'▲':'▼'}</div>
    </div>
    <div class="dog-titles-preview">
      ${badges.map(b=>`<span class="title-badge ${b.cls}">${b.label}</span>`).join('')}
      ${!badges.length?'<span style="font-size:12px;color:var(--muted);">No titles yet</span>':''}
    </div>
    <div class="dog-detail ${isOpen?'open':''}" id="detail-${dog.id}">
      ${dog.dock ? renderDockSection(dog) : ''}
      ${dog.shed ? renderShedSection(dog) : ''}
      ${dog.timed_recall ? renderTimedRecall(dog) : ''}
    </div>
  </div>`;
}

// ── TOGGLE HANDLERS ───────────────────────────────────────────────────────────
function toggleCard(id) {
  expandedCards[id] = !expandedCards[id];
  document.getElementById(`detail-${id}`).classList.toggle('open', expandedCards[id]);
  document.getElementById(`chev-${id}`).textContent = expandedCards[id] ? '▲' : '▼';
}
function toggleDetails(id) {
  openDetails[id] = !openDetails[id];
  document.getElementById(id).classList.toggle('open', openDetails[id]);
  const tog = document.getElementById(`dtoggle-${id}`);
  if (tog) tog.textContent = openDetails[id] ? '▲' : '▼';
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderDogList(dogs) {
  const list = document.getElementById('dogList');
  const label = document.getElementById('sectionLabel');
  if (!dogs.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🐾</div><h3>No dogs found</h3><p>Try a different search term.</p></div>`;
    label.style.display = 'none';
    return;
  }
  label.style.display = 'block';
  label.textContent = `${dogs.length} dog${dogs.length!==1?'s':''} registered`;
  list.innerHTML = dogs.map(d => renderDogCard(d)).join('');
}
function filterDogs() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  renderDogList(!q ? allDogs : allDogs.filter(d => d.name.toLowerCase().includes(q)||d.id.includes(q)));
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function setStatus(type,msg){
  const bar=document.getElementById('statusBar'),txt=document.getElementById('statusText');
  bar.className=`status ${type}`;txt.textContent=msg;
}

async function loadData(){
  setStatus('loading','Loading dogs.json...');
  try {
    const res = await fetch('dogs.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allDogs = await res.json();
    setStatus('success',`Loaded ${allDogs.length} dogs · ${new Date().toLocaleTimeString()}`);
    renderDogList(allDogs);
  } catch(e) {
    setStatus('error','Could not load dogs.json — make sure it is in the same folder as this file.');
    console.error(e);
  }
}
window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
